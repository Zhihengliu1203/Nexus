<script>
  // Fade-in au chargement
  window.addEventListener("DOMContentLoaded", () => {
    document.body.classList.add("loaded");
  });

  // Fade-out quand on clique un lien interne
  document.addEventListener("click", (e) => {
    const a = e.target.closest("a");
    if(!a) return;

    const href = a.getAttribute("href") || "";

    // ignore ancres (#), liens externes, new tab
    if(href.startsWith("#")) return;
    if(a.target === "_blank") return;
    if(href.startsWith("http")) return;
    if(href.startsWith("mailto:") || href.startsWith("tel:")) return;

    e.preventDefault();
    document.body.classList.add("leaving");
    setTimeout(() => { window.location.href = href; }, 220);
  });
</script>

  <script>
    const KEY = "brebeuf_groups_v1";
    const USERKEY = "brebeuf_user_v1";
    const REMKEY = "brebeuf_reminders_v1";
    const RELKEY = "brebeuf_reliability_v1";

    const $ = (id) => document.getElementById(id);

    function loadGroups(){
      try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
      catch { return []; }
    }
    function saveGroups(groups){
      localStorage.setItem(KEY, JSON.stringify(groups));
    }
    function loadUser(){
      try { return JSON.parse(localStorage.getItem(USERKEY) || "{}"); }
      catch { return {}; }
    }
    function saveUser(u){
      localStorage.setItem(USERKEY, JSON.stringify(u));
    }
    function loadReliability(){
      try { return JSON.parse(localStorage.getItem(RELKEY) || '{"noShow":0}'); }
      catch { return { noShow: 0 }; }
    }
    function uid(){
      return Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    let toastTimer = null;
    function toast(msg){
      const t = $("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.style.display = "none", 2400);
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function money(n){
      const x = Number(n);
      if(!isFinite(x)) return "—";
      return x.toFixed(2) + " $";
    }

    function calcPerPerson(totalCost, feePerPerson, max){
      const t = Number(totalCost), f = Number(feePerPerson), m = Number(max);
      if(!isFinite(t) || !isFinite(f) || !isFinite(m) || m <= 0) return null;
      return (t / m) + f;
    }

    function statusOf(g){
      const max = g.max || 0;
      const joined = (g.participants || []).length;
      const threshold = Math.max(2, Math.ceil(max * (g.confirmThreshold ?? 0.7)));
      const confirmed = joined >= threshold;
      const full = joined >= max;
      return { confirmed, full, joined, max, threshold };
    }

    function seedIfEmpty(){
      const groups = loadGroups();
      if(groups.length) return;

      const demo = [
        {
          id: uid(),
          title: "Badminton jeudi 18h (Claude-Robillard)",
          sport: "Badminton",
          niveau: "Intermédiaire",
          lieu: "Claude-Robillard",
          jour: "Jeudi",
          heure: "18:00",
          dureeH: 1.0,
          max: 8,
          costTotal: 27,
          feePerPerson: 1.00,
          confirmThreshold: 0.7,
          notes: "Raquettes requises. rM/nrM selon votre statut.",
          source: "https://montreal.ca/lieux/gymnase-double-du-complexe-sportif-claude-robillard",
          owner: "Admin",
          participants: ["Admin", "Kaeli"],
          waitlist: ["Jake"],
          chat: [{ by: "Admin", text: "Salut! Dites votre niveau et si vous avez une raquette.", ts: Date.now()-600000 }],
          createdAt: Date.now()-7200000
        },
        {
          id: uid(),
          title: "Tennis samedi 14h (Parc Martin-Luther-King)",
          sport: "Tennis",
          niveau: "Mixte",
          lieu: "Parc Martin-Luther-King",
          jour: "Samedi",
          heure: "14:00",
          dureeH: 1.0,
          max: 4,
          costTotal: 12,
          feePerPerson: 0.50,
          confirmThreshold: 0.75,
          notes: "Si gratuit sur certaines périodes, on ajuste le coût à 0.",
          source: "https://montreal.ca/lieux/terrains-de-tennis-et-de-pickleball-du-parc-martin-luther-king",
          owner: "Admin",
          participants: ["Admin"],
          waitlist: [],
          chat: [],
          createdAt: Date.now()-3600000
        },
        {
          id: uid(),
          title: "Gym multi mardi 19h (BdeB)",
          sport: "Multi",
          niveau: "Mixte",
          lieu: "BdeB",
          jour: "Mardi",
          heure: "19:00",
          dureeH: 1.5,
          max: 10,
          costTotal: 62.70,
          feePerPerson: 1.00,
          confirmThreshold: 0.7,
          notes: "Apportez des chaussures propres.",
          source: "https://complexesportif.bdeb.qc.ca/plateaux-sportifs-interieurs",
          owner: "Admin",
          participants: ["Admin","Lashwana","Zhiheng","Jake","Kaeli","Amina","Sam"],
          waitlist: [],
          chat: [],
          createdAt: Date.now()-5200000
        }
      ];
      saveGroups(demo);
    }

    function renderChat(chat){
      if(!chat || !chat.length) return `<p class="msg">Aucun message.</p>`;
      return chat.slice(-40).map(m => {
        const when = new Date(m.ts || Date.now()).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
        return `<p class="msg"><b>${escapeHtml(m.by || "?")}</b> <span style="opacity:.7">(${when})</span> : ${escapeHtml(m.text || "")}</p>`;
      }).join("");
    }

    function renderMyGroups(groups, name){
      const box = $("myGroups");
      if(!box) return;

      if(!name){
        box.innerHTML = `<div class="hint">Entre ton prénom pour voir tes groupes.</div>`;
        return;
      }
      const mine = groups.filter(g => (g.participants || []).includes(name) || (g.waitlist || []).includes(name));
      if(!mine.length){
        box.innerHTML = `<div class="hint">Aucun groupe rejoint pour l’instant.</div>`;
        return;
      }
      box.innerHTML = mine.map(g => {
        const st = statusOf(g);
        const tag = (g.participants || []).includes(name) ? "Participant" : "Attente";
        const pill = tag === "Participant" ? "ok" : "warn";
        return `
          <div class="box">
            <div style="display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap;">
              <div>
                <div style="font-weight:850;">${escapeHtml(g.title)}</div>
                <div class="hint">${escapeHtml(g.jour)} ${escapeHtml(g.heure)} • ${escapeHtml(g.lieu)} • ${st.joined}/${st.max}</div>
              </div>
              <span class="pill ${pill}">${tag}</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function getName(){
      const u = loadUser();
      return (u.name || "").trim();
    }

    function joinGroup(id){
      const name = getName();
      if(!name) return toast("Entre ton prénom d’abord.");

      const groups = loadGroups();
      const g = groups.find(x => x.id === id);
      if(!g) return;

      g.participants = g.participants || [];
      g.waitlist = g.waitlist || [];

      if(g.participants.includes(name)) return toast("Tu es déjà dans ce groupe.");
      if(g.waitlist.includes(name)) return toast("Tu es déjà en liste d’attente.");

      const st = statusOf(g);
      if(st.full){
        g.waitlist.push(name);
        saveGroups(groups);
        toast("Groupe complet → ajouté à la liste d’attente.");
        render();
        return;
      }

      g.participants.push(name);
      saveGroups(groups);
      toast("✅ Rejoint !");

      const st2 = statusOf(g);
      if(st2.confirmed){
        g.chat = g.chat || [];
        g.chat.push({ by: "Système", text: "🎉 Groupe confirmé !", ts: Date.now() });
        saveGroups(groups);
      }
      render();
    }

    function toggleWait(id){
      const name = getName();
      if(!name) return toast("Entre ton prénom d’abord.");

      const groups = loadGroups();
      const g = groups.find(x => x.id === id);
      if(!g) return;

      g.waitlist = g.waitlist || [];
      const i = g.waitlist.indexOf(name);
      if(i >= 0){
        g.waitlist.splice(i,1);
        saveGroups(groups);
        toast("Retiré de la liste d’attente.");
        render();
        return;
      }
      g.waitlist.push(name);
      saveGroups(groups);
      toast("Ajouté à la liste d’attente.");
      render();
    }

    function leaveGroup(id){
      const name = getName();
      if(!name) return toast("Entre ton prénom d’abord.");

      const groups = loadGroups();
      const g = groups.find(x => x.id === id);
      if(!g) return;

      g.participants = g.participants || [];
      g.waitlist = g.waitlist || [];

      const wasIn = g.participants.includes(name);
      g.participants = g.participants.filter(p => p !== name);
      g.waitlist = g.waitlist.filter(p => p !== name);

      const st = statusOf(g);
      if(!st.full && g.waitlist.length > 0){
        const next = g.waitlist.shift();
        g.participants.push(next);
        g.chat = g.chat || [];
        g.chat.push({ by: "Système", text: `✅ ${next} a été ajouté du waitlist (place libérée).`, ts: Date.now() });
        toast(`Tu as quitté. ${next} est entré depuis l’attente.`);
      } else {
        toast(wasIn ? "Tu as quitté le groupe." : "Retiré.");
      }

      saveGroups(groups);
      render();
    }

    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
        toast("Copié ✅");
      } catch {
        toast("Copie impossible (browser).");
      }
    }

    function sendMessage(id){
      const name = getName();
      if(!name) return toast("Entre ton prénom d’abord.");

      const input = $("msg-" + id);
      if(!input) return;
      const text = input.value.trim();
      if(!text) return;

      const groups = loadGroups();
      const g = groups.find(x => x.id === id);
      if(!g) return;

      g.chat = g.chat || [];
      g.chat.push({ by: name, text, ts: Date.now() });
      saveGroups(groups);
      input.value = "";
      render();
      toast("Message envoyé.");
    }

    function shareGroup(id){
      const groups = loadGroups();
      const g = groups.find(x => x.id === id);
      if(!g) return;

      const text = `Groupe: ${g.title} | ${g.jour} ${g.heure} | Lieu: ${g.lieu} | Sport: ${g.sport} | Niveau: ${g.niveau}`;
      copyText(text);
    }

    function resetFilters(){
      $("q").value = "";
      $("sport").value = "";
      $("niveau").value = "";
      $("lieu").value = "";
      $("jour").value = "";
      $("statut").value = "";
      $("prix").value = "";
      render();
    }

    function wipeDemo(){
      localStorage.removeItem(KEY);
      toast("Données démo effacées.");
      render();
    }

    function createGroup(){
      const name = getName();
      if(!name) return toast("Entre ton prénom d’abord.");

      const title = $("title").value.trim();
      const sport = $("cSport").value;
      const niveau = $("cNiveau").value;
      const lieu = $("cLieu").value;
      const jour = $("cJour").value;
      const heure = $("cHeure").value.trim() || "18:00";
      const dureeH = Number($("cDuree").value || 1);
      const max = Number($("cPlaces").value || 10);
      const costTotal = Number($("cCost").value || 0);
      const feePerPerson = Number($("cFee").value || 0);
      const notes = $("cNotes").value.trim();

      if(!max || max < 2) return toast("Places max doit être ≥ 2.");
      if(!isFinite(costTotal)) return toast("Coût total invalide.");
      if(!isFinite(feePerPerson)) return toast("Frais/pers invalide.");

      const g = {
        id: uid(),
        title: title || `${sport} ${jour} ${heure} (${lieu})`,
        sport, niveau, lieu, jour, heure,
        dureeH: isFinite(dureeH) ? dureeH : 1,
        max,
        costTotal,
        feePerPerson,
        confirmThreshold: 0.7,
        notes,
        source: "",
        owner: name,
        participants: [name],
        waitlist: [],
        chat: [{ by: "Système", text: "Groupe créé ✅. Partage-le pour attirer des joueurs.", ts: Date.now() }],
        createdAt: Date.now()
      };

      const groups = loadGroups();
      groups.unshift(g);
      saveGroups(groups);

      $("title").value = "";
      $("cHeure").value = "";
      $("cDuree").value = "";
      $("cPlaces").value = "";
      $("cCost").value = "";
      $("cFee").value = "";
      $("cNotes").value = "";

      toast("✨ Groupe créé !");
      render();
    }

    function syncUserUI(){
      const u = loadUser();
      $("displayName").value = u.name || "";
      const rem = localStorage.getItem(REMKEY) === "1";
      $("reminders").checked = rem;

      const rel = loadReliability();
      const score = Math.max(0, 100 - (rel.noShow || 0) * 20);
      $("reliability").textContent = "Fiabilité: " + score;
    }

    function render(){
      const groups = loadGroups();
      const user = loadUser();
      const name = (user.name || "").trim();

      const q = $("q").value.trim().toLowerCase();
      const fSport = $("sport").value;
      const fNiv = $("niveau").value;
      const fLieu = $("lieu").value;
      const fJour = $("jour").value;
      const fStatut = $("statut").value;
      const fPrix = $("prix").value;

      const filtered = groups.filter(g => {
        const blob = `${g.title} ${g.sport} ${g.niveau} ${g.lieu} ${g.jour} ${g.heure} ${g.notes} ${g.source}`.toLowerCase();
        if(q && !blob.includes(q)) return false;
        if(fSport && g.sport !== fSport) return false;
        if(fNiv && g.niveau !== fNiv) return false;
        if(fLieu && g.lieu !== fLieu) return false;
        if(fJour && g.jour !== fJour) return false;

        const per = calcPerPerson(g.costTotal, g.feePerPerson, g.max);
        if(fPrix && per != null){
          const [a,b] = fPrix.split("-").map(Number);
          if(!(per >= a && per < b)) return false;
        } else if (fPrix) {
          return false;
        }

        const st = statusOf(g);
        if(fStatut === "open" && st.joined >= st.max) return false;
        if(fStatut === "full" && !st.full) return false;
        if(fStatut === "confirmed" && !st.confirmed) return false;

        return true;
      });

      $("count").textContent = `${filtered.length} groupe(s) affiché(s) • ${groups.length} total`;

      renderMyGroups(groups, name);

      const container = $("groups");
      container.innerHTML = filtered.length ? "" : `
        <div class="card group">
          <div class="gtitle">Aucun groupe trouvé</div>
          <div class="hint" style="margin-top:6px;">Essaie un autre filtre, ou crée un groupe à droite.</div>
        </div>
      `;

      for(const g of filtered){
        const st = statusOf(g);
        const per = calcPerPerson(g.costTotal, g.feePerPerson, g.max);
        const isIn = name && (g.participants || []).includes(name);
        const isWait = name && (g.waitlist || []).includes(name);

        let statusPill = `<span class="pill ok">Ouvert</span>`;
        if(st.full) statusPill = `<span class="pill warn">Complet</span>`;
        if(st.confirmed) statusPill = `<span class="pill">Confirmé</span>`;

        const joinBtn = !name
          ? `<span class="pill bad">Entre ton prénom pour rejoindre</span>`
          : isIn
            ? `<button class="btn small danger" data-act="leave" data-id="${g.id}">Quitter</button>`
            : (st.full
                ? `<button class="btn small warn" data-act="wait" data-id="${g.id}">${isWait ? "Quitter attente" : "Liste d’attente"}</button>`
                : `<button class="btn small primary" data-act="join" data-id="${g.id}">Rejoindre</button>`);

        const shareText = `Groupe: ${g.title} | ${g.jour} ${g.heure} | Lieu: ${g.lieu} | Sport: ${g.sport} | Niveau: ${g.niveau}`;

        const sourceLink = g.source
          ? `<a class="link" href="${escapeHtml(g.source)}" target="_blank" rel="noopener">Source</a>`
          : `<span style="color:rgba(183,196,221,.7)">—</span>`;

        const html = `
          <div class="card group">
            <div class="groupHead">
              <div>
                <div class="titleLine">
                  <span class="gtitle">${escapeHtml(g.title || `${g.sport} ${g.jour} ${g.heure}`)}</span>
                  ${statusPill}
                  <span class="pill">${escapeHtml(g.sport)}</span>
                  <span class="pill">${escapeHtml(g.niveau)}</span>
                  <span class="pill">${escapeHtml(g.lieu)}</span>
                </div>
                <div class="meta">
                  <span>🗓️ ${escapeHtml(g.jour)} • 🕒 ${escapeHtml(g.heure)} • ⏱️ ${escapeHtml(g.dureeH)}h</span>
                  <span>👥 ${st.joined}/${st.max} (confirmé à ${st.threshold})</span>
                  <span>💰 ${per == null ? "—" : money(per)} / pers</span>
                  <span>🔗 ${sourceLink}</span>
                </div>
              </div>

              <div class="actions">
                ${joinBtn}
                <button class="btn small" data-act="share" data-id="${g.id}">Partager</button>
              </div>
            </div>

            <details>
              <summary>Voir détails + chat</summary>

              <div class="detailGrid">
                <div class="box">
                  <h3>Notes / règles</h3>
                  <p>${escapeHtml(g.notes || "—")}</p>
                  <p style="margin-top:8px;">
                    <span class="pill">Organisateur: ${escapeHtml(g.owner || "—")}</span>
                    <span class="pill">Coût total: ${money(g.costTotal)} • Frais/pers: ${money(g.feePerPerson)}</span>
                  </p>
                </div>

                <div class="box">
                  <h3>Participants</h3>
                  <p>${escapeHtml((g.participants || []).join(", ") || "—")}</p>
                  <p style="margin-top:8px;">
                    <span class="pill warn">Attente: ${escapeHtml((g.waitlist || []).join(", ") || "—")}</span>
                  </p>
                </div>
              </div>

              <div class="box" style="margin-top:12px;">
                <h3>Chat (mini)</h3>
                <div class="chat">
                  <div class="chatLog" id="log-${g.id}">
                    ${renderChat(g.chat || [])}
                  </div>
                  <div class="row">
                    <input class="input" id="msg-${g.id}" placeholder="Écrire un message…" />
                    <button class="btn small" data-act="send" data-id="${g.id}">Envoyer</button>
                  </div>
                </div>
              </div>

              <div class="box" style="margin-top:12px;">
                <h3>Partage (copie)</h3>
                <p class="hint" style="margin-bottom:10px;">Copie ce texte pour Instagram/DM :</p>
                <div class="row">
                  <input class="input" value="${escapeHtml(shareText)}" readonly />
                  <button class="btn small" data-act="copy" data-text="${escapeHtml(shareText)}">Copier</button>
                </div>
              </div>
            </details>
          </div>
        `;
        container.insertAdjacentHTML("beforeend", html);
      }
    }

    function init(){
      seedIfEmpty();
      syncUserUI();
      render();

      ["q","sport","niveau","lieu","jour","statut","prix"].forEach(id => {
        $(id).addEventListener("input", render);
        $(id).addEventListener("change", render);
      });

      $("reset").addEventListener("click", resetFilters);
      $("wipe").addEventListener("click", wipeDemo);

      $("displayName").addEventListener("input", (e) => {
        const u = loadUser();
        u.name = e.target.value;
        saveUser(u);
        render();
      });

      $("reminders").addEventListener("change", (e) => {
        localStorage.setItem(REMKEY, e.target.checked ? "1" : "0");
        toast(e.target.checked ? "Rappels activés (MVP)." : "Rappels désactivés.");
      });

      $("create").addEventListener("click", createGroup);
      $("seed").addEventListener("click", () => {
        localStorage.removeItem(KEY);
        seedIfEmpty();
        toast("Données démo ajoutées.");
        render();
      });

      document.addEventListener("click", (e) => {
        const el = e.target.closest("[data-act]");
        if(!el) return;

        const act = el.getAttribute("data-act");
        const id = el.getAttribute("data-id");

        if(act === "join") joinGroup(id);
        if(act === "leave") leaveGroup(id);
        if(act === "wait") toggleWait(id);
        if(act === "send") sendMessage(id);
        if(act === "share") shareGroup(id);
        if(act === "copy") copyText(el.getAttribute("data-text") || "");
      });
    }

    init();
  </script>
  <script>
  // Fade-in au chargement
  window.addEventListener("DOMContentLoaded", () => {
    document.body.classList.add("loaded");
  });

  // Fade-out quand on clique un lien interne
  document.addEventListener("click", (e) => {
    const a = e.target.closest("a");
    if(!a) return;

    const href = a.getAttribute("href") || "";

    // ignore ancres (#), liens externes, new tab
    if(href.startsWith("#")) return;
    if(a.target === "_blank") return;
    if(href.startsWith("http")) return;
    if(href.startsWith("mailto:") || href.startsWith("tel:")) return;

    e.preventDefault();
    document.body.classList.add("leaving");
    setTimeout(() => { window.location.href = href; }, 220);
  });
</script>

</body>
</html>
